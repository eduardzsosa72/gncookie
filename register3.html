<script>
    /**
     * Posts a challenge event to the appropriate targets.
     * 
     * - If window === parent (div mode): posts to window only
     * - If window !== parent (iframe mode): posts to both window and parent
     * 
     * @param {string} eventId - The event ID (e.g., "aa-challenge-loaded", "aa-challenge-complete")
     * @param {object} [payload] - Optional payload to include with the event
     */
    function postChallengeEvent(eventId, payload) {
        var message = payload 
            ? JSON.stringify({ eventId: eventId, payload: payload })
            : JSON.stringify({ eventId: eventId });
        
        // Always post to window
        window.postMessage(message, "*");
        
        // Also post to parent if different (iframe mode)
        if (window !== parent) {
            parent.postMessage(message, "*");
        }
    }
</script>
